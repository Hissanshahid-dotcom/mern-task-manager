<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c7aff"/>
      <stop offset="100%" stop-color="#5b6cff"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f2ff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#3a3fcc" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="108" fill="url(#bgGrad)" filter="url(#softShadow)"/>

  <!-- Subtle inner highlight -->
  <rect x="32" y="32" width="448" height="224" rx="108" fill="#ffffff" opacity="0.06"/>

  <!-- Checkmark badge circle -->
  <circle cx="256" cy="256" r="132" fill="#ffffff" opacity="0.12"/>

  <!-- Checkmark -->
  <path d="M168 268 L226 326 L348 196"
        fill="none"
        stroke="url(#checkGrad)"
        stroke-width="40"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
